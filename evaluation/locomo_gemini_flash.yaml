# evals/configs/locomo_gemini_flash.yaml
# =======================================
# Full LOCOMO benchmark run using Gemini 1.5 Flash
# Expected cost: ~$2 USD for all 50 conversations (8M tokens)
# Expected runtime: ~60-90 minutes

# Data
locomo_path: evals/locomo/locomo_dataset.json
limit: null   # null = full benchmark (50 conversations)

# Model
provider: gemini
model: gemini-1.5-flash
api_key_env: GEMINI_API_KEY

# Dagestan settings
dagestan_db_path: evals/results/dagestan_memory.json
schema_induction: true          # dynamic schema induction (core claim)
hybrid_retrieval: true
vector_store_path: evals/results/chroma_store
nightly_curation: true          # offline curation between sessions
decay_enabled: true
contradiction_resolution: llm

# Tasks to evaluate
tasks:
  - qa
  - summarization
  - coherence

# Retrieval mode
retrieval_mode: hybrid

# Output
results_dir: evals/results
