# evals/configs/smoke_test.yaml
# ==============================
# Fast smoke test: 3 conversations, all tasks, stub provider (no LLM calls)
# Use this to verify the eval harness is wired correctly before a real run.
#
#   python evals/run_locomo_eval.py --config evals/configs/smoke_test.yaml

provider: stub       # no LLM calls — returns empty strings
model: stub

locomo_path: evals/locomo/locomo_dataset.json
limit: 3

dagestan_db_path: /tmp/dagestan_smoke.json
schema_induction: true
hybrid_retrieval: false   # skip vector store in smoke test
vector_store_path: /tmp/chroma_smoke
nightly_curation: true
decay_enabled: true
contradiction_resolution: none

tasks:
  - qa
  - summarization
  - coherence

retrieval_mode: graph
results_dir: evals/results/smoke
