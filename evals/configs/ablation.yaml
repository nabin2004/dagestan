# evals/configs/ablation.yaml
# ============================
# Ablation study config — override retrieval_mode via CLI:
#
#   python evals/run_locomo_eval.py --config evals/configs/ablation.yaml --retrieval graph
#   python evals/run_locomo_eval.py --config evals/configs/ablation.yaml --retrieval vector
#   python evals/run_locomo_eval.py --config evals/configs/ablation.yaml --retrieval hybrid
#   python evals/run_locomo_eval.py --config evals/configs/ablation.yaml --retrieval none
#   python evals/run_locomo_eval.py --config evals/configs/ablation.yaml --no-schema-induction

provider: gemini
model: gemini-1.5-flash
api_key_env: GEMINI_API_KEY

locomo_path: evals/locomo/locomo_dataset.json
limit: 10    # ablations use a 10-conversation subset for speed

dagestan_db_path: evals/results/ablation_dagestan.json
schema_induction: true
hybrid_retrieval: true
vector_store_path: evals/results/ablation_chroma
nightly_curation: true
decay_enabled: true
contradiction_resolution: llm

tasks:
  - qa
  - coherence

retrieval_mode: hybrid  # overridden by --retrieval flag
results_dir: evals/results/ablations
